apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: 22i1269xx/worker:24d60006960c84f28277c9eda1caa209fb65fc5a
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: DATABASE_HOST
          value: "db"
