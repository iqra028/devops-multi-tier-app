apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: 22i1269xx/worker:b331744a341e0c3d344b6ae14b9707506069766d
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: DATABASE_HOST
          value: "db"
